<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Gestor Biblioteca de Videojuegos</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="container">
      <h1>Gestor Biblioteca de Videojuegos</h1>

      <form id="form-juego" class="card">
        <div class="row">
          <label for="titulo">Título</label>
          <input id="titulo" name="titulo" required />
        </div>

        <div class="row">
          <label for="plataforma">Plataforma</label>
          <select id="plataforma" name="plataforma" required>
            <option value="Steam">Steam</option>
            <option value="Riot Games">Riot Games</option>
            <option value="Epic Games">Epic Games</option>
            <option value="Ubisoft">Ubisoft</option>
            <option value="Roblox">Roblox</option>
            <option value="Supercell">Supercell</option>
            <option value="Activision">Activision</option>
          </select>
        </div>

        <div class="row">
          <label for="estado">Estado</label>
          <select id="estado" name="estado" required>
            <option value="Pendiente">Pendiente</option>
            <option value="Jugando">Jugando</option>
            <option value="Completado">Completado</option>
          </select>
        </div>

        <div class="row actions">
          <button type="submit">Agregar juego</button>
        </div>
      </form>

      <section class="card">
        <h2>Biblioteca</h2>
        <table id="tabla-juegos">
          <thead>
            <tr><th>ID</th><th>Título</th><th>Plataforma</th><th>Estado</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
